<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f2f1; }
    #msg { padding: 24px; color: #605e5c; font-size: 14px; }
    #frame { width: 100%; height: 100%; border: none; display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/vss-web-extension-sdk/lib/VSS.SDK.min.js"></script>
</head>
<body>
  <p id="msg">Loading KubeDock Security Scan report&hellip;</p>
  <iframe id="frame" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
  <script>
    VSS.init({ explicitNotifyLoaded: true, usePlatformScripts: false });
    VSS.ready(function () {
      var cfg = VSS.getConfiguration();
      var ctx = VSS.getWebContext();
      VSS.require(['VSS/Service', 'TFS/Build/RestClient'], function (Service, BuildClient) {
        var client = Service.getCollectionClient(BuildClient.BuildHttpClient);
        client.getAttachmentContent(ctx.project.id, cfg.buildId, 'Distributedtask.Core.Summary', 'KubeDock Security Scan')
          .then(function (content) {
            var html = new TextDecoder('utf-8').decode(new Uint8Array(content));
            var blob = new Blob([html], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            var frame = document.getElementById('frame');
            frame.src = url;
            frame.style.display = 'block';
            document.getElementById('msg').style.display = 'none';
            frame.addEventListener('load', function () { URL.revokeObjectURL(url); }, { once: true });
          })
          .catch(function () {
            document.getElementById('msg').textContent = 'No scan report found for this run. Run the KubeDock Security Scan task first.';
          });
        VSS.notifyLoadSucceeded();
      });
    });
  </script>
</body>
</html>
