<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f2f1; }
    #msg { padding: 24px; color: #605e5c; font-size: 14px; }
    #frame { width: 100%; height: 100%; border: none; display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/vss-web-extension-sdk/lib/VSS.SDK.min.js"></script>
</head>
<body>
  <p id="msg">Loading KubeDock Security Scan report&hellip;</p>
  <iframe id="frame" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
  <script>
    VSS.init({ explicitNotifyLoaded: true, usePlatformScripts: false });
    VSS.ready(function () {
      VSS.notifyLoadSucceeded();
      var cfg = VSS.getConfiguration();
      var ctx = VSS.getWebContext();
      var collectionUri = ctx.collection.uri.replace(/\/?$/, '/');
      var url = collectionUri + ctx.project.id +
        '/_apis/build/builds/' + cfg.buildId +
        '/attachments/Distributedtask.Core.Summary/KubeDock%20Security%20Scan?api-version=6.0';

      VSS.getAccessToken().then(function (tokenObj) {
        return fetch(url, { headers: { 'Authorization': 'Bearer ' + tokenObj.token } });
      }).then(function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status + ' – run the KubeDock Security Scan task first');
        return response.text();
      }).then(function (html) {
        var blob = new Blob([html], { type: 'text/html' });
        var blobUrl = URL.createObjectURL(blob);
        var frame = document.getElementById('frame');
        frame.src = blobUrl;
        frame.style.display = 'block';
        document.getElementById('msg').style.display = 'none';
        frame.addEventListener('load', function () { URL.revokeObjectURL(blobUrl); }, { once: true });
      }).catch(function (err) {
        document.getElementById('msg').textContent = 'Could not load report: ' + String(err);
      });
    });
  </script>
</body>
</html>
