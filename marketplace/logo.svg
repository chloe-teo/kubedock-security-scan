<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <!-- Deep DevOps Dark Blue Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
  </defs>

  <!-- Background Canvas with rounded corners -->
  <rect width="220" height="220" rx="44" fill="url(#bg-grad)" />

  <!-- Water Waves -->
  <path d="M 30,182 Q 110,195 190,182" fill="none" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" opacity="0.8" />
  <path d="M 60,192 Q 110,202 160,192" fill="none" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" opacity="0.5" />

  <!-- Ship Hull -->
  <path d="M 45,140 L 175,140 L 155,170 L 65,170 Z" fill="#F1F5F9" />
  <path d="M 52,150 L 168,150 L 161,160 L 59,160 Z" fill="#CBD5E1" />

  <!-- Cargo Containers (representing Docker/Kubernetes Manifests) -->
  <!-- Left Container (Docker Cyan) -->
  <rect x="60" y="108" width="45" height="32" rx="4" fill="#0EA5E9" />
  <line x1="71" y1="112" x2="71" y2="136" stroke="#0284C7" stroke-width="2" stroke-linecap="round" />
  <line x1="82" y1="112" x2="82" y2="136" stroke="#0284C7" stroke-width="2" stroke-linecap="round" />
  <line x1="93" y1="112" x2="93" y2="136" stroke="#0284C7" stroke-width="2" stroke-linecap="round" />

  <!-- Right Container (Kubernetes Indigo) -->
  <rect x="115" y="108" width="45" height="32" rx="4" fill="#6366F1" />
  <line x1="126" y1="112" x2="126" y2="136" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" />
  <line x1="137" y1="112" x2="137" y2="136" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" />
  <line x1="148" y1="112" x2="148" y2="136" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" />

  <!-- Magnifying Glass (Security Scan & Inspection) -->
  <!-- Shadow for Magnifying Glass depth -->
  <g opacity="0.4" transform="translate(3, 4)">
    <circle cx="110" cy="97" r="33" fill="none" stroke="#020617" stroke-width="6" />
    <line x1="133" y1="120" x2="158" y2="145" stroke="#020617" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Solid Frame & Handle -->
  <!-- Main Handle -->
  <line x1="133" y1="120" x2="158" y2="145" stroke="#F1F5F9" stroke-width="8" stroke-linecap="round" />
  <!-- Dark Handle Grip Detail -->
  <line x1="143" y1="130" x2="158" y2="145" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" />

  <!-- Outer Circular Frame -->
  <circle cx="110" cy="97" r="33" fill="none" stroke="#F1F5F9" stroke-width="6" />

  <!-- Glass Lens (Transparent Cyan) -->
  <circle cx="110" cy="97" r="30" fill="#38BDF8" fill-opacity="0.25" />

  <!-- Lens Highlight (Reflection) -->
  <path d="M 89,77 A 30,30 0 0,1 131,77" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
</svg>